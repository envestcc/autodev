# autodev 配置示例 —— React Web 应用
# Example config — React Web App (TaskFlow)
#
# 使用方法 / Usage:
#   首次运行 autodev skill 时会自动交互生成此文件
#   Auto-generated on first run of autodev skill
#   也可手动创建 .autodev/config.yaml 并填入以下内容
#   Or manually create .autodev/config.yaml with the following

product:
  name: "TaskFlow"                      # Product name
  description: "一个基于 React 的团队任务管理 Web 应用，支持看板视图、任务分配、截止日期提醒和团队协作"
  # A React-based team task management web app with kanban, assignments, deadlines, and collaboration

personas:
  - name: "项目经理"                    # Project Manager
    description: "30 岁，管理 8 人开发团队，每天使用任务管理工具 2-3 小时，之前用过 Trello 和 Notion"
    # Age 30, manages 8-person dev team, uses task tools 2-3h daily, previously used Trello & Notion
    focus: ["任务创建流程", "看板拖拽体验", "响应式布局", "加载性能"]
    # task creation flow, kanban drag experience, responsive layout, loading performance

source_dirs: ["src"]                    # Source code directories
docs_dir: "docs/autodev"               # Iteration docs output directory
code_conventions: "TypeScript + React 18，使用 Tailwind CSS，组件遵循函数式写法，使用 React Query 管理服务端状态"
# TypeScript + React 18, Tailwind CSS, functional components, React Query for server state

iteration:
  max_rounds: 5                         # Number of iteration rounds
  max_items_per_round: 8                # Max improvements per round
  commit_prefix: "improve: iteration"   # Git commit prefix
