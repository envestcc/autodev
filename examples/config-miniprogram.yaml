# autodev 配置示例 —— 微信小程序（数学错题本）
# Example config — WeChat Mini Program (Math Mistake Book)
#
# 使用方法 / Usage:
#   首次运行 autodev skill 时会自动交互生成此文件
#   Auto-generated on first run of autodev skill
#   也可手动创建 .autodev/config.yaml 并填入以下内容
#   Or manually create .autodev/config.yaml with the following

product:
  name: "数学错题本"                    # Product name
  description: "一个微信小程序，帮助高中生通过拍照快速录入数学错题，并通过闪卡复习、知识点统计等功能提升复习效率"
  # A WeChat mini program that helps high school students capture math mistakes via photo and review with flashcards

personas:
  - name: "高三理科生"                  # Senior high school science student
    description: "正在备战高考，数学成绩约100-110分（满分150），弱项为解析几何和三角函数，曾用过实体错题本但因太费时间而放弃"
    # Preparing for college entrance exam, math ~110/150, weak in analytic geometry
    focus: ["错题录入效率", "复习体验", "数据统计准确性", "新用户上手体验"]
    # mistake entry efficiency, review experience, data accuracy, onboarding

source_dirs: ["miniprogram"]            # Source code directories
docs_dir: "docs/autodev"               # Iteration docs output directory
code_conventions: "微信小程序规范（WXML/WXSS/JS），使用微信云开发，遵循项目现有代码风格"
# WeChat Mini Program standards (WXML/WXSS/JS), using WeChat Cloud

iteration:
  max_rounds: 5                         # Number of iteration rounds
  max_items_per_round: 6                # Max improvements per round
  commit_prefix: "feat(autodev):"       # Git commit prefix
