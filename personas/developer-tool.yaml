# Persona 模板：开发者工具
# 适用于：CLI、SDK、API 服务、开发者库、DevOps 工具
# 用法：复制需要的 persona 到你的 .autodev/config.yaml 的 personas 数组中

personas:
  - name: "初级开发者"
    description: "1-2年经验，熟悉基本命令行，不熟悉高级配置和底层原理"
    focus: ["安装流程", "Quick Start", "错误提示可读性", "文档准确性"]

  - name: "资深开发者"
    description: "5年+经验，用过多个同类工具，追求效率、可定制性和可编程扩展"
    focus: ["API 设计合理性", "配置灵活性", "性能", "插件/扩展机制"]

  - name: "CI/CD 集成者"
    description: "负责将工具集成到自动化流水线，关注非交互模式和机器可读输出"
    focus: ["非交互模式", "退出码规范", "JSON/结构化输出", "环境变量支持"]

  - name: "开源贡献者"
    description: "想给项目贡献代码的外部开发者，关注代码可维护性和贡献流程"
    focus: ["代码结构清晰度", "CONTRIBUTING 指南", "测试覆盖", "PR 流程"]
